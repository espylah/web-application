spring.application.name=webapi
#logging.level.org.springframework.security=DEBUG
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
app.registration.token-expiry-seconds=${REG_TOKEN_EXPIRY:600}
app.demo-mode=${DEMO_MODE:false}
# app.otp.stub=true  # Uncomment (or set env OTP_STUB=true) to return the OTP in the response instead of emailing it

spring.datasource.url=${JDBC_URL:jdbc:h2:mem:espylah}
spring.datasource.username=${JDBC_USERNAME:sa}
spring.datasource.password=${JDBC_PASSOWRD:password}

spring.jpa.open-in-view=false

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:noreply@espylah.local}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

#logging.level.root=debug